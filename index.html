
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .app {
    min-height: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    font-family: var(--font-sans);
    position: relative;
  }
  .screen {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .logo {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
  }
  .headline {
    font-size: 26px;
    font-weight: 500;
    color: var(--color-text-primary);
    text-align: center;
    line-height: 1.3;
  }
  .sub {
    font-size: 15px;
    color: var(--color-text-secondary);
    text-align: center;
    line-height: 1.6;
  }
  .btn-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }
  .state-btn {
    width: 100%;
    padding: 14px 20px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    font-size: 15px;
    font-weight: 400;
    color: var(--color-text-primary);
    cursor: pointer;
    text-align: left;
    transition: background 0.18s, border-color 0.18s, transform 0.12s;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--font-sans);
  }
  .state-btn:hover {
    background: var(--color-background-primary);
    border-color: var(--color-border-secondary);
    transform: translateY(-1px);
  }
  .state-btn:active { transform: scale(0.98); }
  .state-btn .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--color-text-tertiary);
    flex-shrink: 0;
  }
  .action-card {
    width: 100%;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1.75rem 1.5rem;
    text-align: center;
  }
  .action-step {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text-primary);
    line-height: 1.4;
    margin-bottom: 0.75rem;
  }
  .action-hint {
    font-size: 14px;
    color: var(--color-text-secondary);
    line-height: 1.6;
  }
  .breath-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid var(--color-border-secondary);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 0.5; }
    50%      { transform: scale(1.18); opacity: 1; }
  }
  .breath-inner {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--color-border-tertiary);
    animation: pulse 4s ease-in-out infinite 0.3s;
  }
  .counter {
    font-size: 13px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.06em;
    margin-top: 0.5rem;
  }
  .primary-btn {
    width: 100%;
    padding: 15px;
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border: none;
    border-radius: var(--border-radius-lg);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.18s, transform 0.12s;
    font-family: var(--font-sans);
  }
  .primary-btn:hover { opacity: 0.88; }
  .primary-btn:active { transform: scale(0.98); }
  .two-btn {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
  }
  .outline-btn {
    padding: 13px;
    background: transparent;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-lg);
    font-size: 15px;
    font-weight: 400;
    color: var(--color-text-primary);
    cursor: pointer;
    transition: background 0.18s, transform 0.12s;
    font-family: var(--font-sans);
  }
  .outline-btn:hover { background: var(--color-background-secondary); }
  .outline-btn:active { transform: scale(0.98); }
  .tag {
    display: inline-block;
    font-size: 12px;
    color: var(--color-text-tertiary);
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 100px;
    padding: 4px 12px;
  }
  .divider {
    width: 32px; height: 1px;
    background: var(--color-border-tertiary);
  }
  .big-quote {
    font-size: 20px;
    font-weight: 500;
    color: var(--color-text-primary);
    text-align: center;
    line-height: 1.45;
  }
  .hidden { display: none !important; }
  .progress-dots {
    display: flex; gap: 6px;
  }
  .pdot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--color-border-tertiary);
    transition: background 0.3s;
  }
  .pdot.active { background: var(--color-text-primary); }
  .step-label {
    font-size: 12px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .back-btn {
    position: absolute;
    top: 1.25rem; left: 1.25rem;
    background: none;
    border: none;
    font-size: 13px;
    color: var(--color-text-tertiary);
    cursor: pointer;
    padding: 4px 8px;
    font-family: var(--font-sans);
    transition: color 0.18s;
  }
  .back-btn:hover { color: var(--color-text-secondary); }
  .celebration {
    font-size: 13px;
    color: var(--color-text-secondary);
    text-align: center;
    line-height: 1.7;
    animation: fadeIn 0.8s ease 0.3s both;
  }
</style>

<div class="app" id="app">

  <div class="screen" id="screen-home">
    <div class="logo">Reset</div>
    <div class="divider"></div>
    <div class="headline">How do you feel right now?</div>
    <div class="sub">Pick one. Get a quick reset.</div>
    <div class="btn-grid">
      <button class="state-btn" onclick="selectState('anxious')"><span class="dot"></span>Anxious</button>
      <button class="state-btn" onclick="selectState('cantstart')"><span class="dot"></span>Can't start</button>
      <button class="state-btn" onclick="selectState('overwhelmed')"><span class="dot"></span>Overwhelmed</button>
      <button class="state-btn" onclick="selectState('noenergy')"><span class="dot"></span>No energy</button>
      <button class="state-btn" onclick="selectState('scrolling')"><span class="dot"></span>Scrolling again</button>
    </div>
  </div>

  <div class="screen hidden" id="screen-action">
    <button class="back-btn" onclick="goHome()">← back</button>
    <div class="progress-dots">
      <div class="pdot active"></div>
      <div class="pdot"></div>
    </div>
    <div class="step-label" id="action-label">Breathing</div>
    <div class="breath-ring"><div class="breath-inner"></div></div>
    <div class="action-card">
      <div class="action-step" id="action-step"></div>
      <div class="action-hint" id="action-hint"></div>
    </div>
    <div class="counter" id="breath-counter"></div>
    <button class="primary-btn" id="done-btn" onclick="showAfter()">Done</button>
    <div class="tag">~2 min</div>
  </div>

  <div class="screen hidden" id="screen-after">
    <div class="progress-dots">
      <div class="pdot"></div>
      <div class="pdot active"></div>
    </div>
    <div class="big-quote">"You're not in danger.<br>Your body is just overloaded."</div>
    <div class="divider"></div>
    <div class="sub">Feel a bit better?</div>
    <div class="two-btn">
      <button class="primary-btn" onclick="showDone()">Yes</button>
      <button class="outline-btn" onclick="tryAgain()">Not yet</button>
    </div>
  </div>

  <div class="screen hidden" id="screen-done">
    <div class="logo">Reset</div>
    <div class="divider"></div>
    <div class="big-quote">Good.</div>
    <div class="celebration">Every reset counts.<br>Come back whenever you need.</div>
    <button class="primary-btn" onclick="goHome()">Start over</button>
  </div>

  <div class="screen hidden" id="screen-retry">
    <div class="big-quote">That's okay.</div>
    <div class="sub">Sit with it for a moment.<br>Sometimes that's the reset.</div>
    <div class="divider"></div>
    <div class="two-btn">
      <button class="primary-btn" onclick="goHome()">Try another</button>
      <button class="outline-btn" onclick="showAfter2()">Keep going</button>
    </div>
  </div>

</div>

<script>
const states = {
  anxious: {
    label: 'Breathing reset',
    step: 'Take 6 slow breaths',
    hint: 'Make your exhale longer than your inhale.\nBreathe in for 4 — out for 7.',
    counter: true
  },
  cantstart: {
    label: 'Two-minute start',
    step: 'Name one tiny action',
    hint: 'Not the whole thing. Just the first 2 minutes.\nOpen the file. Write one sentence. That\'s it.',
    counter: false
  },
  overwhelmed: {
    label: 'Brain dump',
    step: 'Write it all down',
    hint: 'List everything in your head — messy is fine.\nNothing to solve right now. Just empty it out.',
    counter: false
  },
  noenergy: {
    label: 'Body reset',
    step: 'Stand up. Move for 60 sec.',
    hint: 'Walk, shake your hands, stretch your neck.\nYour body needs a signal, not a nap.',
    counter: false
  },
  scrolling: {
    label: 'Pattern interrupt',
    step: 'Put the phone face down',
    hint: 'Look at something in the room for 20 seconds.\nName 3 things you can see. Now 3 you can hear.',
    counter: false
  }
};

let breathCount = 0;
let breathTimer = null;
let currentState = null;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
}

function goHome() {
  clearBreath();
  show('screen-home');
}

function selectState(state) {
  currentState = state;
  const s = states[state];
  document.getElementById('action-label').textContent = s.label;
  document.getElementById('action-step').textContent = s.step;
  document.getElementById('action-hint').textContent = s.hint;
  breathCount = 0;
  clearBreath();
  if (s.counter) {
    document.getElementById('breath-counter').textContent = 'Breath 1 of 6';
    startBreathCount();
  } else {
    document.getElementById('breath-counter').textContent = '';
  }
  show('screen-action');
}

function startBreathCount() {
  breathCount = 0;
  document.getElementById('breath-counter').textContent = 'Breath 1 of 6';
  breathTimer = setInterval(() => {
    breathCount++;
    if (breathCount >= 6) {
      clearInterval(breathTimer);
      document.getElementById('breath-counter').textContent = 'All done — take a moment';
      return;
    }
    document.getElementById('breath-counter').textContent = 'Breath ' + (breathCount + 1) + ' of 6';
  }, 11000);
}

function clearBreath() {
  if (breathTimer) { clearInterval(breathTimer); breathTimer = null; }
}

function showAfter() {
  clearBreath();
  show('screen-after');
}

function showAfter2() {
  show('screen-after');
}

function showDone() {
  show('screen-done');
}

function tryAgain() {
  show('screen-retry');
}
</script>
