<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Reset — Feel better in 2 minutes</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      var(--tg-theme-bg-color, #ffffff);
      --bg2:     var(--tg-theme-secondary-bg-color, #f2f2f7);
      --text:    var(--tg-theme-text-color, #000000);
      --text2:   var(--tg-theme-hint-color, #8e8e93);
      --text3:   var(--tg-theme-hint-color, #aeaeb2);
      --btnbg:   var(--tg-theme-button-color, #007aff);
      --btntext: var(--tg-theme-button-text-color, #ffffff);
      --radius: 16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1.25rem 3rem;
    }

    .app {
      width: 100%;
      max-width: 420px;
    }

    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 0.4; }
      50%      { transform: scale(1.2); opacity: 1; }
    }

    .hidden { display: none !important; }

    .logo {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text2);
    }

    .divider {
      width: 28px; height: 1px;
      background: var(--text3);
      opacity: 0.3;
    }

    .headline {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      line-height: 1.3;
    }

    .sub {
      font-size: 15px;
      color: var(--text2);
      text-align: center;
      line-height: 1.65;
    }

    .btn-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .state-btn {
      width: 100%;
      padding: 15px 18px;
      background: var(--bg2);
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .state-btn:active { opacity: 0.7; transform: scale(0.98); }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text2);
      opacity: 0.5;
      flex-shrink: 0;
    }

    .breath-ring {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 2px solid var(--text2);
      opacity: 0.5;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 4s ease-in-out infinite;
    }

    .breath-inner {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--text2);
      opacity: 0.3;
      animation: pulse 4s ease-in-out infinite 0.4s;
    }

    .action-card {
      width: 100%;
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 1.75rem 1.5rem;
      text-align: center;
    }

    .action-step {
      font-size: 21px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 0.75rem;
    }

    .action-hint {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.7;
      white-space: pre-line;
    }

    .counter {
      font-size: 13px;
      color: var(--text2);
      letter-spacing: 0.05em;
      min-height: 20px;
    }

    .primary-btn {
      width: 100%;
      padding: 16px;
      background: var(--btnbg);
      color: var(--btntext);
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.1s;
    }

    .primary-btn:active { opacity: 0.8; transform: scale(0.98); }

    .outline-btn {
      padding: 15px;
      background: var(--bg2);
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.1s;
    }

    .outline-btn:active { opacity: 0.7; transform: scale(0.98); }

    .two-btn {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }

    .tag {
      font-size: 12px;
      color: var(--text2);
      background: var(--bg2);
      border-radius: 100px;
      padding: 5px 14px;
    }

    .step-label {
      font-size: 11px;
      color: var(--text2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .progress-dots { display: flex; gap: 6px; }
    .pdot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text2);
      opacity: 0.3;
      transition: opacity 0.3s;
    }
    .pdot.active { opacity: 1; background: var(--btnbg); }

    .big-quote {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      line-height: 1.45;
    }

    .back-btn {
      align-self: flex-start;
      background: none;
      border: none;
      font-size: 14px;
      color: var(--text2);
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .celebration {
      font-size: 15px;
      color: var(--text2);
      text-align: center;
      line-height: 1.7;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HOME -->
  <div class="screen" id="screen-home">
    <div class="logo">Reset</div>
    <div class="divider"></div>
    <div class="headline">How do you feel right now?</div>
    <div class="sub">Pick one. Get a quick reset.</div>
    <div class="btn-grid">
      <button class="state-btn" onclick="selectState('anxious')"><span class="dot"></span>Anxious</button>
      <button class="state-btn" onclick="selectState('cantstart')"><span class="dot"></span>Can't start</button>
      <button class="state-btn" onclick="selectState('overwhelmed')"><span class="dot"></span>Overwhelmed</button>
      <button class="state-btn" onclick="selectState('noenergy')"><span class="dot"></span>No energy</button>
      <button class="state-btn" onclick="selectState('scrolling')"><span class="dot"></span>Scrolling again</button>
    </div>
  </div>

  <!-- ACTION -->
  <div class="screen hidden" id="screen-action">
    <button class="back-btn" onclick="goHome()">← back</button>
    <div class="progress-dots">
      <div class="pdot active"></div>
      <div class="pdot"></div>
    </div>
    <div class="step-label" id="action-label">Breathing</div>
    <div class="breath-ring"><div class="breath-inner"></div></div>
    <div class="action-card">
      <div class="action-step" id="action-step"></div>
      <div class="action-hint" id="action-hint"></div>
    </div>
    <div class="counter" id="breath-counter"></div>
    <button class="primary-btn" onclick="showAfter()">Done</button>
    <div class="tag">~2 min</div>
  </div>

  <!-- AFTER -->
  <div class="screen hidden" id="screen-after">
    <div class="progress-dots">
      <div class="pdot"></div>
      <div class="pdot active"></div>
    </div>
    <div class="big-quote">"You're not in danger.<br>Your body is just overloaded."</div>
    <div class="divider"></div>
    <div class="sub">Feel a bit better?</div>
    <div class="two-btn">
      <button class="primary-btn" onclick="showDone()">Yes</button>
      <button class="outline-btn" onclick="tryAgain()">Not yet</button>
    </div>
  </div>

  <!-- DONE -->
  <div class="screen hidden" id="screen-done">
    <div class="logo">Reset</div>
    <div class="divider"></div>
    <div class="big-quote">Good.</div>
    <div class="celebration">Every reset counts.<br>Come back whenever you need.</div>
    <button class="primary-btn" onclick="goHome()">Start over</button>
  </div>

  <!-- RETRY -->
  <div class="screen hidden" id="screen-retry">
    <div class="big-quote">That's okay.</div>
    <div class="sub">Sit with it for a moment.<br>Sometimes that's the reset.</div>
    <div class="divider"></div>
    <div class="two-btn">
      <button class="primary-btn" onclick="goHome()">Try another</button>
      <button class="outline-btn" onclick="showAfter2()">Keep going</button>
    </div>
  </div>

</div>
<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const states = {
    anxious:     { label:'Breathing reset',   step:'Take 6 slow breaths',          hint:'Make your exhale longer than your inhale.\nBreathe in for 4 — out for 7.',                                    counter:true  },
    cantstart:   { label:'Two-minute start',  step:'Name one tiny action',          hint:'Not the whole thing. Just the first 2 minutes.\nOpen the file. Write one sentence. That\'s it.',             counter:false },
    overwhelmed: { label:'Brain dump',        step:'Write it all down',             hint:'List everything in your head — messy is fine.\nNothing to solve right now. Just empty it out.',              counter:false },
    noenergy:    { label:'Body reset',        step:'Stand up. Move for 60 sec.',    hint:'Walk, shake your hands, stretch your neck.\nYour body needs a signal, not a nap.',                           counter:false },
    scrolling:   { label:'Pattern interrupt', step:'Put the phone face down',       hint:'Look at something in the room for 20 seconds.\nName 3 things you can see. Now 3 you can hear.',              counter:false }
  };

  let breathTimer = null, breathCount = 0;

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    const el = document.getElementById(id);
    el.classList.remove('hidden');
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
    window.scrollTo(0, 0);
  }

  function goHome() { clearBreath(); show('screen-home'); }

  function selectState(state) {
    const s = states[state];
    document.getElementById('action-label').textContent = s.label;
    document.getElementById('action-step').textContent = s.step;
    document.getElementById('action-hint').textContent = s.hint;
    breathCount = 0; clearBreath();
    const counter = document.getElementById('breath-counter');
    if (s.counter) { counter.textContent = 'Breath 1 of 6'; startBreathCount(); }
    else { counter.textContent = ''; }
    show('screen-action');
  }

  function startBreathCount() {
    breathTimer = setInterval(() => {
      breathCount++;
      const counter = document.getElementById('breath-counter');
      if (breathCount >= 6) { clearInterval(breathTimer); counter.textContent = 'All done — take a moment'; return; }
      counter.textContent = 'Breath ' + (breathCount + 1) + ' of 6';
    }, 11000);
  }

  function clearBreath() { if (breathTimer) { clearInterval(breathTimer); breathTimer = null; } }

  function showAfter()  { clearBreath(); show('screen-after'); }
  function showAfter2() { show('screen-after'); }
  function showDone()   { show('screen-done'); }
  function tryAgain()   { show('screen-retry'); }
</script>
</body>
</html>
